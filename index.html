<style>
  * { box-sizing: border-box; }
  body, html {
    margin: 0; padding: 0;
    font-family: 'Arial', sans-serif;
    height: 100%; width: 100%;
  }
  body {
    background: url('tarsier.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    display: flex; justify-content: center; align-items: center;
    padding: 20px;
  }
  .container {
    position: relative;
    text-align: center;
    padding: 40px 25px;
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(4px);
  }
  h1 {
    font-size: 38px;
    font-weight: bold;
    margin-bottom: 18px;
    line-height: 1.2;
    text-shadow: 2px 2px 6px #000;
  }
  p {
    font-size: 16px;
    margin-bottom: 25px;
    line-height: 1.4;
    text-shadow: 1px 1px 3px #000;
  }
  input {
    padding: 12px;
    width: 100%;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    margin-bottom: 18px;
    outline: none;
  }
  button {
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #00b894;
    color: #fff;
    font-weight: bold;
    transition: 0.3s;
    width: 100%;
  }
  button:hover { background: #019875; }

  /* Modal Styles */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(4px);
  }
  .modal-content {
    background: rgba(30, 30, 40, 0.95);
    margin: 15% auto;
    padding: 35px 30px;
    border-radius: 16px;
    width: 90%;
    max-width: 460px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .close {
    color: #aaa;
    float: right;
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;
    line-height: 0.8;
  }
  .close:hover,
  .close:focus {
    color: #fff;
    text-decoration: none;
  }
  #modalMessage {
    font-size: 22px;
    font-weight: bold;
    margin: 30px 0 20px;
    line-height: 1.4;
  }
  .success { color: #00ff96; }
  .error   { color: #ff4757; }
  .warning { color: #e17055; }

  @media(max-width: 500px) {
    h1 { font-size: 32px; }
    p { font-size: 14px; }
    input, button { font-size: 14px; padding: 10px; }
    .modal-content { padding: 25px 20px; margin: 20% auto; }
    #modalMessage { font-size: 18px; }
  }
</style>

  <button onclick="checkAirdrop()">Check</button>

function checkAirdrop() {
  const input = document.getElementById("userInput").value.trim();
  const modal = document.getElementById("resultModal");
  const messageEl = document.getElementById("modalMessage");

  if (input === "") {
    messageEl.textContent = "❌ Please enter Wallet or Username.";
    messageEl.className = "warning";
    modal.style.display = "block";
    return;
  }

  if (airdropList.includes(input)) {
    messageEl.textContent = "🎉 Congrats! You are selected for the airdrop.";
    messageEl.className = "success";
  } else {
    messageEl.textContent = "❌ Sorry, you are not on the list.";
    messageEl.className = "error";
  }

  modal.style.display = "block";
}

function closeModal() {
  document.getElementById("resultModal").style.display = "none";
}

window.onclick = function(event) {
  const modal = document.getElementById("resultModal");
  if (event.target === modal) {
    modal.style.display = "none";
  }
}
